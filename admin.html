<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Globia Admin Dashboard</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  storageBucket: "globia-7038f.appspot.com",
  messagingSenderId: "323603007481",
  appId: "1:323603007481:web:ed058146cae31922dd9f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

/* 🔐 CHANGE THIS */
const ADMIN_EMAIL = "info@globiaworld.com";

/* LOGIN */
window.login = async () => {
  await signInWithPopup(auth, provider);
};

/* AUTH CHECK */
onAuthStateChanged(auth, async (user) => {

  if(!user){
    document.getElementById("loginBox").style.display = "block";
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:100px;'>Access Denied</h2>";
    return;
  }

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  loadApplicants();

});

/* LOAD DATA */
async function loadApplicants(){

  const container = document.getElementById("data");

  const q = query(collection(db, "applications"), orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);

  container.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${d.name}</h3>
      <p><b>Email:</b> ${d.email}</p>
      <p><b>Position:</b> ${d.position || "N/A"}</p>
      <p><b>About:</b> ${d.about || ""}</p>
      <a href="${d.cv}" target="_blank" class="btn">Download CV</a>
    `;

    container.appendChild(div);
  });

}

</script>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  background:#f4f6f9;
}

/* LOGIN BOX */
.loginBox{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.loginBtn{
  padding:15px 25px;
  background:#0f9d58;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:30px;
}

.header{
  font-size:24px;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:#0072ff;
  color:white;
  border-radius:8px;
  text-decoration:none;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="loginBox">
  <button class="loginBtn" onclick="login()">Admin Login with Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

  <div class="header">📊 Job Applications</div>

  <div id="data" class="grid"></div>

</div>

</body>
</html>
