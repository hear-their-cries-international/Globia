<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" sizes="32x32" href="images/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism</title>        

<style>
body { 
  margin:0; 
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
  background:#f4f7fb; 
}

/* NAVBAR */
nav {
  background:#0a1f44;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { height:60px; }

nav a {
  color:white;
  margin:0 12px;
  text-decoration:none;
  font-weight:600;
}

nav a:hover { color:#ff6600; }

/* HERO */
.hero {
  height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background:linear-gradient(rgba(0,0,0,0.0), rgba(0,0,0,0.0)),
             url("/images/hero.jpg") center/cover no-repeat;
}

.hero h1 { font-size:46px; }

/* SECTION */
.section { padding:50px 40px; text-align:center; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

/* CARD */
.card {
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
  transition:0.4s;
  position:relative;
}

.card:hover { transform:translateY(-10px) scale(1.02); }

/* IMAGE */
.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

/* 🔥 SLOT BADGE */
.slot {
  position:absolute;
  top:15px;
  left:15px;
  background:#ff3b3b;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
}

/* CONTENT */
.card-content { padding:25px; }

/* ⭐ STARS */
.rating {
  color:#ffaa00;
  margin:5px 0;
}

/* 💬 SCROLL REVIEWS */
.ticker {
  overflow:hidden;
  white-space:nowrap;
  background:#fff;
  padding:10px;
  margin-top:20px;
  border-radius:10px;
}

.ticker span {
  display:inline-block;
  padding-right:50px;
  animation:scroll 25s linear infinite;
  font-size:14px;
  color:#555;
}

/* SCROLL ANIMATION */
@keyframes scroll {
  0% { transform:translateX(100%); }
  100% { transform:translateX(-100%); }
}

/* BUTTON */
.btn {
  padding:12px 22px;
  background:#ff6600;
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

/* FADE */
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}
</style>
</head>

<body>

<nav>
  <img src="images/logo.png" class="logo">
  <div>
    <a href="index.html">Home</a>
    <a href="conference.html">Conferences</a>
    <a href="tourism.html">Tourism</a>
  </div>
</nav>

<div class="hero">
  <h1>Explore Tourism</h1>
</div>

<section class="section">
<h2>Destinations</h2>

<div class="grid">

<!-- MAASAI -->
<div class="card">
<div class="slot" id="slot1">🔥 fewslots left</div>
<img src="/images/maasai.jpg">
<div class="card-content">

<h3>Maasai Mara</h3>
<div class="rating" id="rating1">★★★★★</div>

<p>Experience one of Africa’s most iconic reserves.</p>

<button class="btn" onclick="payTour(5000)">Book - KES 5000</button>
</div>
</div>

<!-- DUBAI -->
<div class="card">
<div class="slot" id="slot2">🔥 limited offer</div>
<img src="/images/dubai.jpg">
<div class="card-content">

<h3>Dubai</h3>
<div class="rating" id="rating2">★★★★☆</div>

<p>Luxury and adventure combined.</p>

<button class="btn" onclick="payTour(10000)">Book - KES 10000</button>
</div>
</div>

</div>

<!-- 💬 LIVE SCROLL REVIEWS -->
<div class="ticker">
<span id="reviews"></span>
</div>

</section>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
// PAYSTACK
function payTour(amount){
  let handler = PaystackPop.setup({
    key: "pk_test_f1a02bf2a0d437eeaff6995e005dd6dc74473780",
    email: "customer@email.com",
    amount: amount * 100,
    currency: "KES",
    callback: function(response){
      alert("✅ Payment successful!");
    }
  });
  handler.openIframe();
}

// ⭐ RANDOM RATINGS (4–5 stars)
function randomStars(){
  return Math.random() > 0.5 ? "★★★★★" : "★★★★☆";
}
document.getElementById("rating1").innerText = randomStars();
document.getElementById("rating2").innerText = randomStars();

// 🔥 SLOT REDUCTION
function reduceSlots(id){
  let el = document.getElementById(id);
  let num = parseInt(el.innerText);
  if(num > 2){
    num--;
    el.innerText = "🔥 " + num + " slots left";
  }
}
setInterval(()=>reduceSlots("slot1"),12000);
setInterval(()=>reduceSlots("slot2"),15000);

// 💬 20+ REVIEWS
const reviewsList = [
"John (UK): Amazing trip!",
"Mary (USA): Loved every moment!",
"Ali (UAE): Worth it!",
"Sophia (Italy): Incredible!",
"James (Canada): Highly recommend!",
"Lina (Germany): Beautiful experience!",
"David (Australia): Perfect!",
"Grace (Kenya): Fantastic!",
"Lucas (France): 10/10!",
"Ahmed (Qatar): Luxury trip!",
"Eva (Spain): Stunning!",
"Daniel (SA): Best holiday!",
"Anna (Sweden): Loved it!",
"Tom (Ireland): Amazing safari!",
"Sarah (NZ): Great service!",
"Mike (USA): Perfect booking!",
"Fatima (UAE): Top experience!",
"Leo (Brazil): So fun!",
"Emma (UK): Will return!",
"Noah (USA): Incredible!"
];

// SCROLL TEXT
document.getElementById("reviews").innerText =
reviewsList.join("   •   ");
</script>

</body>
</html>
