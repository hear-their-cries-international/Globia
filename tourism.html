
<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" sizes="32x32" href="images/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#f4f7fb;
}

/* NAV */
nav {
  background:#0a1f44;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo { height:60px; }
nav a { color:white; margin:0 12px; text-decoration:none; }

/* HERO */
.hero {
  height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background:linear-gradient(rgba(0,0,0,0.0),rgba(0,0,0,0.0)),
  url("/images/hero.jpg") center/cover no-repeat;
}
.hero h1 { font-size:46px; }

/* GRID */
.section { padding:50px 40px; text-align:center; }
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

/* CARD */
.card {
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
  position:relative;
  transition:0.4s;
  opacity:0;
  transform:translateY(40px);
}
.card.show { opacity:1; transform:translateY(0); }

.card:hover {
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 0 25px rgba(255,102,0,0.4);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.5s;
}
.card:hover img { transform:scale(1.1); }

/* BADGES */
.badge {
  position:absolute;
  top:10px;
  left:10px;
  background:#ff3b3b;
  color:white;
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
}
.offer { top:40px; background:#ff6600; }

/* CONTENT */
.card-content { padding:25px; }
h3 { color:#0a1f44; }

/* STARS */
.stars { color:#ffaa00; margin:5px 0; }

/* REVIEW */
.review-box {
  background:#f9fbff;
  padding:10px;
  border-radius:10px;
  font-size:13px;
  color:#555;
  margin-bottom:10px;
}

/* BENEFITS */
.benefits { list-style:none; padding:0; }
.benefits li {
  padding-left:20px;
  position:relative;
  margin-bottom:6px;
}
.benefits li::before {
  content:"✔";
  position:absolute;
  left:0;
  color:#ff6600;
}

/* BUTTON */
.btn {
  padding:12px 22px;
  background:linear-gradient(135deg,#ff7a18,#ff6600);
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}
.btn:hover { transform:scale(1.05); }

/* POPUP */
.popup {
  position:fixed;
  bottom:20px;
  left:20px;
  background:white;
  padding:12px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  display:none;
  font-size:14px;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.65);
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter: blur(6px);
}

.modal-content {
  background:white;
  padding:30px;
  border-radius:18px;
  width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

.modal-content input,
.modal-content select {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

.close {
  float:right;
  cursor:pointer;
}

/* CONTACT */
.contact {
  background:#0a1f44;
  color:white;
  padding:40px;
  text-align:center;
  margin-top:50px;
}
</style>
</head>

<body>

<nav>
  <img src="images/logo.png" class="logo">
  <div>
    <a href="index.html">Home</a>
    <a href="conference.html">Conferences</a>
    <a href="tourism.html">Tourism</a>
  </div>
</nav>

<div class="hero"><h1>Explore Tourism</h1></div>

<section class="section">
<h2>Destinations</h2>

<div class="grid">

<div class="card">
<img src="/images/maasai.jpg">
<div class="card-content">
<h3>Maasai Mara</h3>
<button class="btn" onclick="openBooking('Maasai Mara',5000)">Book Now</button>
</div>
</div>

<div class="card">
<img src="/images/dubai.jpg">
<div class="card-content">
<h3>Dubai</h3>
<button class="btn" onclick="openBooking('Dubai',10000)">Book Now</button>
</div>
</div>

</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h3 id="tourName"></h3>

    <input type="email" id="email" placeholder="Enter Email">

    <select id="level" onchange="updatePrice()">
      <option value="regular">Regular</option>
      <option value="vip">VIP</option>
      <option value="economy">Economy</option>
    </select>

    <p><b>Total: $<span id="price"></span></b></p>
    <small>You will be charged in KES at current exchange rate</small>

    <button class="btn" onclick="confirmPay()">Pay Securely</button>
  </div>
</div>

<div class="contact">
  <h2>Contact Us</h2>
  <p>Email: info@globiaworld.com</p>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>

let baseAmount = 0;
let finalUSD = 0;
let tour = "";

// 🔥 exchange rate (adjust anytime)
let rate = 130;

function openBooking(name, amountKES){
  tour = name;
  baseAmount = amountKES / rate; // convert to USD display
  document.getElementById("tourName").innerText = "Book " + name;
  document.getElementById("modal").style.display = "flex";
  updatePrice();
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function updatePrice(){
  let level = document.getElementById("level").value;

  if(level === "vip") finalUSD = baseAmount * 1.5;
  else if(level === "economy") finalUSD = baseAmount * 0.8;
  else finalUSD = baseAmount;

  document.getElementById("price").innerText = finalUSD.toFixed(2);
}

function confirmPay(){
  let email = document.getElementById("email").value;

  let amountKES = finalUSD * rate;

  let handler = PaystackPop.setup({
    key: "pk_test_f1a02bf2a0d437eeaff6995e005dd6dc74473780",
    email: email,
    amount: amountKES * 100,
    currency: "KES",
    channels: ['card','bank_transfer'],
    callback: function(){
      alert("Payment successful for " + tour);
      closeModal();
    }
  });

  handler.openIframe();
}

</script>

</body>
</html>
