
<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" sizes="32x32" href="images/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#f4f7fb;
}

/* NAV */
nav {
  background:#0a1f44;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo { height:60px; }
nav a { color:white; margin:0 12px; text-decoration:none; }

/* HERO */
.hero {
  height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background:url("/images/hero.jpg") center/cover no-repeat;
}
.hero h1 { font-size:46px; }

/* GRID */
.section { padding:50px 40px; text-align:center; }
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

/* CARD */
.card {
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
  position:relative;
  transition:0.4s;
  opacity:0;
  transform:translateY(40px);
}
.card.show { opacity:1; transform:translateY(0); }

.card:hover {
  transform:translateY(-10px) scale(1.02);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

/* BADGES */
.badge {
  position:absolute;
  top:10px;
  left:10px;
  background:#ff3b3b;
  color:white;
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
}
.offer { top:40px; background:#ff6600; }

.card-content { padding:25px; }
.stars { color:#ffaa00; }
.review-box {
  background:#f9fbff;
  padding:10px;
  border-radius:10px;
  font-size:13px;
}

/* BUTTON */
.btn {
  padding:12px 22px;
  background:linear-gradient(135deg,#ff7a18,#ff6600);
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.65);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:30px;
  border-radius:18px;
  width:340px;
}

.modal-content input,
.modal-content select {
  width:100%;
  padding:12px;
  margin:10px 0;
}

.close {
  float:right;
  cursor:pointer;
}

/* CONTACT */
.contact {
  background:#0a1f44;
  color:white;
  padding:40px;
  text-align:center;
}
</style>
</head>

<body>

<nav>
  <img src="images/logo.png" class="logo">
  <div>
    <a href="index.html">Home</a>
    <a href="conference.html">Conferences</a>
    <a href="tourism.html">Tourism</a>
  </div>
</nav>

<div class="hero"><h1>Explore Tourism</h1></div>

<section class="section">
<h2>Destinations</h2>

<div class="grid">

<!-- MAASAI -->
<div class="card">
<div class="badge">🔥 Limited Offer</div>
<div class="badge offer">6 Slots Left</div>

<img src="/images/maasai.jpg">

<div class="card-content">
<h3>Maasai Mara</h3>
<div class="stars">★★★★★</div>
<div class="review-box">Best safari experience ever!</div>

<button class="btn" onclick="openBooking('Maasai Mara',5000)">Book Now</button>
</div>
</div>

<!-- DUBAI -->
<div class="card">
<div class="badge">🔥 Limited Offer</div>
<div class="badge offer">8 Slots Left</div>

<img src="/images/dubai.jpg">

<div class="card-content">
<h3>Dubai</h3>
<div class="stars">★★★★☆</div>
<div class="review-box">Luxury beyond expectations!</div>

<button class="btn" onclick="openBooking('Dubai',10000)">Book Now</button>
</div>
</div>

</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <h3 id="tourName"></h3>
    <input type="email" id="email" placeholder="Enter Email">

    <select id="level" onchange="updatePrice()">
      <option value="regular">Regular</option>
      <option value="vip">VIP</option>
      <option value="economy">Economy</option>
    </select>

    <p><b>Total: $<span id="price"></span></b></p>
    <small>You will be charged in KES</small>

    <button class="btn" onclick="confirmPay()">Pay Securely</button>
  </div>
</div>

<div class="contact">
  <h2>Contact Us</h2>
  <p>Email: info@globiaworld.com</p>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>

let rate = 130;
let baseUSD = 0;
let finalUSD = 0;
let tour = "";

function openBooking(name, kes){
  tour = name;
  baseUSD = kes / rate;
  document.getElementById("modal").style.display = "flex";
  document.getElementById("tourName").innerText = "Book " + name;
  updatePrice();
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function updatePrice(){
  let level = document.getElementById("level").value;

  if(level==="vip") finalUSD = baseUSD*1.5;
  else if(level==="economy") finalUSD = baseUSD*0.8;
  else finalUSD = baseUSD;

  document.getElementById("price").innerText = finalUSD.toFixed(2);
}

function confirmPay(){
  let email = document.getElementById("email").value;
  let kesAmount = finalUSD * rate;

  let handler = PaystackPop.setup({
    key: "pk_test_f1a02bf2a0d437eeaff6995e005dd6dc74473780",
    email: email,
    amount: kesAmount * 100,
    currency: "KES",
    channels: ['card','bank_transfer'],
    callback: function(){
      alert("Payment successful for " + tour);
      closeModal();
    }
  });

  handler.openIframe();
}

/* SCROLL FIX */
const cards = document.querySelectorAll(".card");
function reveal(){
  cards.forEach(c=>{
    if(c.getBoundingClientRect().top < window.innerHeight){
      c.classList.add("show");
    }
  });
}
window.addEventListener("scroll",reveal);
window.addEventListener("load",reveal);

</script>

</body>
</html>
