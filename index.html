<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobiaWorld Ecosystem</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  storageBucket: "globia-7038f.appspot.com",
  messagingSenderId: "323603007481",
  appId: "1:323603007481:web:ed058146cae31922dd9f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* ================= LOGIN ================= */
window.googleLogin = () => {
  signInWithPopup(auth, provider)
  .catch(e => alert(e.message));
};

window.logout = () => {
  signOut(auth).then(() => {
    resetUI();
  });
};

/* ================= STATE ================= */
onAuthStateChanged(auth, (user) => {

  const bar = document.getElementById("topbar");
  const authBtn = document.getElementById("authBtn");
  const logoutBtn = document.getElementById("logoutBtn");

  if(user){

    document.body.style.background = "#f4f7fb";
    bar.style.background = "#1f8f3a";

    authBtn.style.display = "none";
    logoutBtn.style.display = "block";

  } else {

    resetUI();
  }
});

function resetUI(){
  document.body.style.background = "#0b0f1a";

  const bar = document.getElementById("topbar");
  const authBtn = document.getElementById("authBtn");
  const logoutBtn = document.getElementById("logoutBtn");

  bar.style.background = "rgba(10,31,68,0.95)";
  authBtn.style.display = "block";
  logoutBtn.style.display = "none";
}

</script>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  background:#0b0f1a;
  color:white;
  transition:0.4s;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:65px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  backdrop-filter:blur(10px);
  z-index:1000;
}

.logo{height:42px}

/* AUTH BUTTON */
.auth{
  background:linear-gradient(135deg,#ff6600,#ff2d55);
  padding:10px 18px;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
}

/* LOGOUT */
.logout{
  background:#ff3b3b;
  padding:10px 18px;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
  display:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
  url('images/joe.jpg') center/cover;
}

.hero h1{font-size:42px}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:50px;
}

/* CARD */
.card{
  border-radius:18px;
  padding:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

/* COLORS */
.legal{background:linear-gradient(135deg,#0a1f44,#1f4b99);color:white}
.dating{background:linear-gradient(135deg,#ff2d55,#ff0066);color:white}
.conference{background:linear-gradient(135deg,#ff7a18,#ff6600);color:white}
.tourism{background:linear-gradient(135deg,#00c6ff,#0072ff);color:white}

/* CONTACT */
.contact{
  text-align:center;
  padding:50px;
  background:#070a12;
}

/* GOOGLE BUTTON */
.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:white;
  color:black;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar" id="topbar">

  <img src="images/logo.png" class="logo">

  <div id="authBtn" class="auth" onclick="googleLogin()">
    Login / Register
  </div>

  <div id="logoutBtn" class="logout" onclick="logout()">
    Logout
  </div>

</div>

<!-- HERO -->
<section class="hero">
  <h1>GlobiaWorld Ecosystem 🌍</h1>
  <p>Legal • Dating • Conferences • Tourism</p>
</section>

<!-- GRID -->
<div class="grid">

  <div class="card">
    <h2>⚖️ Globia Legal</h2>
    <button class="btn legal" onclick="location.href='justice.html'">Find Lawyer</button>
  </div>

  <div class="card">
    <h2>💘 Globia Dating</h2>
    <button class="btn dating" onclick="location.href='dating.html'">Start Matching</button>
  </div>

  <div class="card">
    <h2>🎤 Globia Conferences</h2>
    <button class="btn conference" onclick="location.href='conference.html'">Explore Events</button>
  </div>

  <div class="card">
    <h2>✈️ Globia Tourism</h2>
    <button class="btn tourism" onclick="location.href='tourism.html'">Discover Travel</button>
  </div>

</div>

<!-- CONTACT -->
<div class="contact">
  <h2>Contact Us</h2>
  <p>globiaworld@gmail.com</p>
</div>

</body>
</html>
