<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobiaWorld - Home</title>
<style>
/* General */
body { font-family: 'Arial', sans-serif; margin:0; padding:0; background:#f0f4f8; }
header { background:#87CEEB; color:#fff; padding:40px 20px; display:flex; align-items:center; flex-wrap:wrap; justify-content:center; }
header img { width:80px; height:80px; margin-right:20px; }
header h1 { font-size:3.5rem; font-weight:900; color:#ffffff; text-shadow: 4px 4px 8px rgba(0,0,0,0.35); margin:0; }
header p { width:100%; font-size:1.4rem; margin-top:15px; font-style:italic; color:#e0e0e0; text-align:center; }

/* Top rotating banner */
#banner { display:flex; overflow:hidden; width:100%; background:#fff; border-radius:20px; margin:20px 0; height:180px; }
#banner img { height:180px; flex-shrink:0; margin-right:10px; border-radius:15px; object-fit:cover; transition: transform 0.5s; }

/* Main navigation buttons */
#navButtons { display:flex; justify-content:center; flex-wrap:wrap; gap:30px; margin:30px 0; }
.nav-btn { background:#00BFFF; color:#fff; border:none; padding:20px 40px; border-radius:25px; font-size:1.5rem; cursor:pointer; font-weight:bold; transition: background 0.3s; text-decoration:none; display:flex; align-items:center; gap:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
.nav-btn:hover { background:#009ACD; }

/* Tiers */
#tiers { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:25px; max-width:1200px; margin:auto; margin-bottom:40px; }
.tier-card { background:#fff; padding:20px; border-radius:25px; box-shadow:0 10px 25px rgba(0,0,0,0.1); text-align:center; transition: transform 0.3s, box-shadow 0.3s; }
.tier-card:hover { transform: translateY(-10px); box-shadow:0 15px 30px rgba(0,0,0,0.2); }
.tier-card img { width:60px; height:60px; margin-bottom:10px; }
.tier-card h3 { margin:10px 0; color:#00BFFF; }
.tier-card p { color:#333; font-weight:bold; }

/* Footer */
footer { text-align:center; padding:30px 20px; background:#87CEEB; color:#fff; font-size:1rem; }
</style>
</head>
<body>

<header>
  <img src="files/icons/globe.png" alt="Globia Logo">
  <h1>Globia</h1>
  <p>Empower Your Career</p>
</header>

<!-- Top Rotating Banner -->
<div id="banner">
  <img src="files/images/usa.jpg" alt="USA">
  <img src="files/images/canada.jpg" alt="Canada">
  <img src="files/images/europe.jpg" alt="Europe">
  <img src="files/images/dubai.jpg" alt="Dubai">
  <img src="files/images/uk.jpg" alt="UK">
</div>

<!-- Navigation Buttons -->
<div id="navButtons">
  <a href="onsite.html" class="nav-btn">On-Site Courses</a>
  <a href="remote.html" class="nav-btn">Remote Courses</a>
</div>

<!-- Highlighted Tiers -->
<section id="tiers">
  <div class="tier-card">
    <img src="files/icons/free.png" alt="Free Tier">
    <h3>Free</h3>
    <p>Access basic courses | Jobs: 10 | Salary: $2,000-$3,200</p>
  </div>
  <div class="tier-card">
    <img src="files/icons/vip.png" alt="VIP Tier">
    <h3>VIP</h3>
    <p>Unlock VIP content | $49.99 | Jobs: 15 | Salary: $3,200-$4,500</p>
  </div>
  <div class="tier-card">
    <img src="files/icons/vvip.png" alt="VVIP Tier">
    <h3>VVIP</h3>
    <p>Full access | $199.99 | Jobs: 20 | Salary: $4,500-$6,000</p>
  </div>
</section>

<footer>
  <div>All rights reserved ©2025 Globia</div>
</footer>

<script>
// Banner Auto-Scroll
const banner = document.getElementById('banner');
let scrollPos = 0;
setInterval(() => {
  scrollPos += 1;
  if(scrollPos > banner.scrollWidth - banner.clientWidth) scrollPos = 0;
  banner.scrollLeft = scrollPos;
}, 30);
</script>

</body>
</html>
