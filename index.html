

<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" sizes="50x50" href="images/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Platform</title>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
    authDomain: "globia-7038f.firebaseapp.com",
    projectId: "globia-7038f",
    storageBucket: "globia-7038f.appspot.com",
    messagingSenderId: "323603007481",
    appId: "1:323603007481:web:ed058146cae31922dd9f28",
    measurementId: "G-Z4WRSESF54"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.signup = function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => alert("✅ Account created!"))
      .catch(err => alert(err.message));
  }

  window.login = function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => alert("✅ Logged in!"))
      .catch(err => alert(err.message));
  }

  window.logout = function(){
    signOut(auth);
  }

  onAuthStateChanged(auth, (user) => {
    const status = document.getElementById("userStatus");

    if(user){
      status.innerText = "Logged in as: " + user.email;
    } else {
      status.innerText = "Not logged in";
    }
  });
</script>

<style>
body {
  margin:0;
  font-family:Arial;
}

/* NAV */

}

/* NAV LINKS */

/* HERO */

             url('images/joe.jpg') center/cover;

/* AUTH BOX */
.auth-box {

.auth-box input {

.btn {

</style>
</head>

<body>

<nav>
  <div class="nav-left">
    <img src="images/logo.png" class="logo" alt="GlobiaWorld Logo">
  </div>

  <div>
    <a href="index.html">Home</a>
    <a href="conference.html">Conferences</a>
    <a href="tourism.html">Tourism</a>
  </div>
</nav>

<section class="hero">
  <h1>Global Services Platform</h1>
  <p>Connecting Tourism & Conferences</p>

  <a href="conference.html"><button class="btn">Explore Conferences</button></a>
  <a href="tourism.html"><button class="btn">Explore Tourism</button></a>

  <div class="auth-box">
    <h3>Account Access</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>

</section>

</body>
</html>
