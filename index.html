<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlobiaWorld</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 100px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: #333;
    }
    p {
      font-size: 20px;
      margin-bottom: 40px;
      color: #555;
    }
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 20px 40px;
      font-size: 18px;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.3s;
    }
    .education {
      background: #1E90FF; /* Sky Blue */
    }
    .education:hover {
      background: #187bcd;
    }
    .tourism {
      background: #20B2AA; /* Teal for Tourism */
    }
    .tourism:hover {
      background: #1a8c80;
    }
  </style>
</head>
<body>

<h1>Welcome to GlobiaWorld</h1>
<p>Explore Knowledge. Explore Opportunities.</p>

<a href="/education" class="btn education">Go to Education</a>
<a href="/tourism" class="btn tourism">Go to Tourism</a>

</body>
</html>
