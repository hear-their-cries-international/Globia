<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobiaWorld Ecosystem</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  storageBucket: "globia-7038f.appspot.com",
  messagingSenderId: "323603007481",
  appId: "1:323603007481:web:ed058146cae31922dd9f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* LOGIN */
window.googleLogin = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    alert(e.message);
  }
};

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);

  // FULL CLEAR
  document.body.classList.remove("logged");
  document.getElementById("userBox").style.display="none";
  document.getElementById("authBtn").style.display="block";
};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {

  if(user){
    document.body.classList.add("logged");

    document.getElementById("authBtn").style.display="none";
    document.getElementById("userBox").style.display="flex";
    document.getElementById("userEmail").innerText = user.email;

  } else {
    document.body.classList.remove("logged");
    document.getElementById("authBtn").style.display="block";
    document.getElementById("userBox").style.display="none";
  }

});

</script>

<style>

/* DEFAULT WHITE BACKGROUND */
body{
  margin:0;
  font-family:Segoe UI;
  background:white;
  color:#111;
}

/* LOGGED IN MODE (GREEN BAR EFFECT) */
body.logged .topbar{
  background:linear-gradient(135deg,#0f9d58,#1db954);
  color:white;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:65px;
  background:#0a1f44;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  z-index:1000;
  transition:0.3s;
}

.logo{height:42px}

/* AUTH BUTTON */
.auth{
  background:linear-gradient(135deg,#ff6600,#ff2d55);
  padding:10px 18px;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
  color:white;
}

/* USER BOX */
.userBox{
  display:none;
  gap:10px;
  align-items:center;
  color:white;
}

.logoutBtn{
  background:#111;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:linear-gradient(rgba(0,0,0,0.0),rgba(0,0,0,0.0)),
  url('images/joe.jpg') center/cover;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:50px;
}

/* CARD */
.card{
  border-radius:18px;
  padding:20px;
  background:#f8f8f8;
  border:1px solid #eee;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

/* BUTTON COLORS */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}

/* LEGAL */
.legal{background:#1f4b99;color:white}

/* DATING */
.dating{background:#ff2d55;color:white}

/* CONFERENCE */
.conference{background:#ff6600;color:white}

/* TOURISM */
.tourism{background:#0072ff;color:white}

/* CONTACT */
.contact{
  text-align:center;
  padding:40px;
  background:#111;
  color:white;
}

.googleBtn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:white;
  border:1px solid #ddd;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <img src="images/logo.png" class="logo">

  <!-- NOT LOGGED IN -->
  <div id="authBtn" class="auth" onclick="googleLogin()">
    <span style="display:flex;align-items:center;gap:8px;">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.7 1.2 9.2 3.6l6.8-6.8C35.9 2.3 30.3 0 24 0 14.6 0 6.5 5.4 2.7 13.2l8 6.2C12.4 13.1 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.9 24.5H24v9.1h12.9c-.6 3-2.2 5.6-4.8 7.3l7.4 5.7c4.5-4.4 7.5-10.1 7.5-17.1z"/>
        <path fill="#FBBC05" d="M10.7 28.4l-8-6.2C.9 16.5 0 20.1 0 24s.9 7.5 2.7 10.6l8-6.2z"/>
        <path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.6l-7.4-5.7C30 38.9 27.3 39.7 24 39.7c-6.3 0-11.6-3.6-13.3-8.9l-8 6.2C6.5 42.6 14.6 48 24 48z"/>
      </svg>
      Sign in with Google
    </span>
  </div>

  <!-- LOGGED IN -->
  <div id="userBox" class="userBox">
    <span id="userEmail"></span>
    <button class="logoutBtn" onclick="logout()">Logout</button>
  </div>

</div>

<!-- HERO -->
<section class="hero">
  <h1>GlobiaWorld Ecosystem 🌍</h1>
  <p>Legal • Dating • Tourism • Conferences</p>
</section>

<!-- PLATFORM -->
<div class="grid">

  <div class="card">
    <h2>⚖️ Globia Legal</h2>
    <button class="btn legal" onclick="location.href='justice.html'">Find Lawyers</button>
  </div>

  <div class="card">
    <h2>💕 Globia     Dating</h2>
    <button class="btn dating" onclick="location.href='dating.html'">Start Matching</button>
  </div>

  <div class="card">
    <h2>🎤 Globia Conferences</h2>
    <button class="btn conference" onclick="location.href='conference.html'">Explore Events</button>
  </div>

  <div class="card">
    <h2>✈️ Globia Tourism</h2>
    <button class="btn tourism" onclick="location.href='tourism.html'">Discover Travel</button>
  </div>

</div>

<!-- CONTACT -->
<div class="contact">
  <h2>Contact Us</h2>
  <p>info@globiaworld.com</p>
</div>

</body>
</html>
