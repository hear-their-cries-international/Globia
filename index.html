<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobiaWorld Ecosystem</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  storageBucket: "globia-7038f.appspot.com",
  messagingSenderId: "323603007481",
  appId: "1:323603007481:web:ed058146cae31922dd9f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const provider = new GoogleAuthProvider();

/* LOGIN */
window.googleLogin = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    alert(e.message);
  }
};

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
  document.body.classList.remove("logged");
  document.getElementById("userBox").style.display="none";
  document.getElementById("authBtn").style.display="block";
};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {

  if(user){
    document.body.classList.add("logged");
    document.getElementById("authBtn").style.display="none";
    document.getElementById("userBox").style.display="flex";
    document.getElementById("userEmail").innerText = user.email;
  } else {
    document.body.classList.remove("logged");
    document.getElementById("authBtn").style.display="block";
    document.getElementById("userBox").style.display="none";
  }

});

/* MODAL */
window.openCareer = () => {
  document.getElementById("careerModal").style.display="flex";
};

window.closeCareer = () => {
  document.getElementById("careerModal").style.display="none";
};

/* SUBMIT APPLICATION (REAL SYSTEM) */
window.submitApplication = async () => {

  const user = auth.currentUser;
  if(!user){
    alert("Please login first");
    return;
  }

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const position = document.getElementById("position").value;
  const about = document.getElementById("about").value;
  const file = document.getElementById("cv").files[0];

  if(!name || !email || !file){
    alert("Please fill all required fields");
    return;
  }

  try{

    /* UPLOAD CV */
    const fileRef = ref(storage, "applications/" + Date.now() + "_" + file.name);
    await uploadBytes(fileRef, file);
    const fileURL = await getDownloadURL(fileRef);

    /* SAVE TO FIRESTORE */
    await addDoc(collection(db, "applications"), {
      name,
      email,
      position,
      about,
      cv: fileURL,
      userId: user.uid,
      createdAt: serverTimestamp()
    });

    alert("Application submitted successfully!");
    closeCareer();

  }catch(e){
    alert("Error: " + e.message);
  }

};

</script>

<style>

/* SAME DESIGN (UNCHANGED) */
body{
  margin:0;
  font-family:Segoe UI;
  background:white;
  color:#111;
}

body.logged .topbar{
  background:linear-gradient(135deg,#0f9d58,#1db954);
  color:white;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:65px;
  background:#0a1f44;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  z-index:1000;
}

.logo{height:42px}

.auth{
  background:linear-gradient(135deg,#ff6600,#ff2d55);
  padding:10px 18px;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
  color:white;
}

.userBox{
  display:none;
  gap:10px;
  align-items:center;
  color:white;
}

.logoutBtn{
  background:#111;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:url('images/joe.jpg') center/cover;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:50px;
}

.card{
  border-radius:18px;
  padding:20px;
  background:#f8f8f8;
  border:1px solid #eee;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}

.conference{background:#ff6600;color:white}
.tourism{background:#0072ff;color:white}
.career{background:#0f9d58;color:white}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.modalContent{
  background:white;
  padding:30px;
  border-radius:15px;
  width:90%;
  max-width:500px;
}

.modalContent input, .modalContent textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.modalContent button{
  background:#0f9d58;
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
  width:100%;
  cursor:pointer;
}

.contact{
  text-align:center;
  padding:40px;
  background:#111;
  color:white;
}

</style>

</head>

<body>

<div class="topbar">
  <img src="images/logo.png" class="logo">

  <div id="authBtn" class="auth" onclick="googleLogin()">
    Sign in with Google
  </div>

  <div id="userBox" class="userBox">
    <span id="userEmail"></span>
    <button class="logoutBtn" onclick="logout()">Logout</button>
  </div>
</div>

<section class="hero">
  <h1>GlobiaWorld Ecosystem 🌍</h1>
  <p>Tourism • Conferences • Careers</p>
</section>

<div class="grid">

  <div class="card">
    <h2>🎤 Globia Conferences</h2>
    <button class="btn conference" onclick="location.href='conference.html'">Explore Events</button>
  </div>

  <div class="card">
    <h2>✈️ Globia Tourism</h2>
    <button class="btn tourism" onclick="location.href='tourism.html'">Discover Travel</button>
  </div>

  <div class="card">
    <h2>💼 Careers at Globia</h2>
    <button class="btn career" onclick="openCareer()">Apply Now</button>
  </div>

</div>

<!-- CAREER MODAL -->
<div id="careerModal" class="modal">
  <div class="modalContent">
    <h2>Apply for a Job</h2>

    <input id="name" type="text" placeholder="Full Name" required>
    <input id="email" type="email" placeholder="Email Address" required>
    <input id="position" type="text" placeholder="Position Applying For">
    <textarea id="about" placeholder="Tell us about yourself"></textarea>
    <input id="cv" type="file" required>

    <button onclick="submitApplication()">Submit Application</button>
    <br><br>
    <button onclick="closeCareer()" style="background:#999;">Close</button>
  </div>
</div>

<div class="contact">
  <h2>Contact Us</h2>
  <p>info@globiaworld.com</p>
</div>

</body>
</html>
