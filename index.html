<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" type="image/png" href="./images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobiaWorld</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  GoogleAuthProvider,
  signInWithPopup,
  setPersistence,
  browserSessionPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  storageBucket: "globia-7038f.firebasestorage.app",
  messagingSenderId: "323603007481",
  appId: "1:323603007481:web:ed058146cae31922dd9f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// FORCE SESSION MODE ON LOAD (FIX)
await setPersistence(auth, browserSessionPersistence);

// SIGNUP
window.signup = async () => {
  const email = emailInput.value;
  const password = passwordInput.value;

  try {
    await setPersistence(auth, browserSessionPersistence);
    await createUserWithEmailAndPassword(auth, email, password);
    showStatus("✅ Account created");
  } catch (err) {
    showStatus(err.message);
  }
};

// LOGIN
window.login = async () => {
  const email = emailInput.value;
  const password = passwordInput.value;

  try {
    await setPersistence(auth, browserSessionPersistence);
    await signInWithEmailAndPassword(auth, email, password);
    closeModal();
  } catch (err) {
    showStatus(err.message);
  }
};

// GOOGLE LOGIN
window.googleLogin = async () => {
  const provider = new GoogleAuthProvider();

  try {
    await setPersistence(auth, browserSessionPersistence);
    await signInWithPopup(auth, provider);
    closeModal();
  } catch (err) {
    showStatus(err.message);
  }
};

// LOGOUT (FULL RESET FIX)
window.logout = async () => {
  await signOut(auth);

  // FORCE UI RESET
  userBar.style.display = "none";
  loginTab.style.display = "block";
};

// AUTH STATE LISTENER (ONLY SOURCE OF TRUTH)
onAuthStateChanged(auth, (user) => {
  if (user) {
    userBar.style.display = "flex";
    userBar.innerHTML = `
      👤 ${user.email}
      <button onclick="logout()">Logout</button>
    `;
    loginTab.style.display = "none";
  } else {
    userBar.style.display = "none";
    loginTab.style.display = "block";
  }
});

// UI
window.openModal = () => authModal.style.display = "flex";
window.closeModal = () => authModal.style.display = "none";
window.showStatus = (msg) => status.innerText = msg;
</script>

<style>
body { margin:0; font-family:Arial; }

/* USER BAR */
.user-bar {
  display:none;
  justify-content:center;
  align-items:center;
  background:#0a1f44;
  color:white;
  padding:6px;
  font-size:14px;
}

.user-bar button {
  margin-left:10px;
  padding:5px 10px;
  background:#ff6600;
  color:white;
  border:none;
  border-radius:4px;
}

/* NAV */
nav {
  background:#0a1f44;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo { max-height:40px; }

.nav-right {
  display:flex;
  align-items:center;
  flex-wrap:wrap;
}

nav a {
  color:white;
  margin:5px 10px;
  text-decoration:none;
}

.login-tab {
  background:#ff6600;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
  color:white;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
             url('./images/joe.jpg') center/cover;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:25px;
  border-radius:10px;
  width:90%;
  max-width:350px;
  text-align:center;
}

.modal-content input {
  width:90%;
  padding:10px;
  margin:10px 0;
}

.modal-content button {
  width:90%;
  padding:10px;
  margin:5px;
  border:none;
  background:#0a1f44;
  color:white;
}

.google-btn { background:#db4437; }

/* MOBILE */
@media(max-width:600px){
  .hero h1 { font-size:26px; }
}
</style>

</head>

<body>

<div id="userBar" class="user-bar"></div>

<nav>
  <img src="./images/logo.png" class="logo">

  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="conference.html">Conferences</a>
    <a href="tourism.html">Tourism</a>

    <div id="loginTab" class="login-tab" onclick="openModal()">
      Login / Sign Up
    </div>
  </div>
</nav>

<section class="hero">
  <h1>Global Services Platform</h1>
  <p>Connecting Tourism & Conferences</p>
</section>

<div id="authModal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" style="float:right;cursor:pointer;">&times;</span>

    <h3>Account Access</h3>

    <input id="emailInput" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Create Account</button>
    <button class="google-btn" onclick="googleLogin()">Google Login</button>

    <p id="status"></p>
  </div>
</div>

</body>
</html>
