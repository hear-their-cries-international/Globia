<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body { font-family: Arial; padding:20px; background:#f4f4f4; }

.header {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.logo {
  height:40px;
}

input {
  display:block;
  width:100%;
  padding:10px;
  margin:10px 0;
}

button {
  padding:10px;
  background:#0a1f44;
  color:white;
  border:none;
  cursor:pointer;
}

.card {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h2>Admin Dashboard</h2>
</div>

<h3>Add Conference</h3>

<input id="name" placeholder="Name">
<input id="date" placeholder="Date">
<input id="location" placeholder="Location">
<input id="desc" placeholder="Description">

<button onclick="add()">Add Conference</button>

<h3>All Conferences</h3>
<div id="list"></div>

<script src="js/ai.js"></script>
<script src="js/chat.js"></script>

<script>
initChat();

async function load(){
const res = await fetch("/events");
const data = await res.json();

let html="";
data.forEach((e,i)=>{
html+=`
<div class="card">
<b>${e.name}</b><br>
${e.location} | ${e.date}<br>
${e.description}<br>
<button onclick="del(${i})">Delete</button>
</div>`;
});

document.getElementById("list").innerHTML=html;
}

async function add(){
const name = name.value;
const date = date.value;
const location = location.value;
const description = desc.value;

await fetch("/add-event",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,date,location,description})
});

alert("✅ Event added!");
load();
}

async function del(i){
await fetch("/delete-event",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({index:i})
});

alert("❌ Event deleted!");
load();
}

load();
</script>

</body>
</html>
