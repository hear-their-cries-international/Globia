<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Conferences</title>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

nav { background:#0a1f44; padding:15px; text-align:center; }
nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; }

.hero {
  height:50vh;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
             url('images/conference1.jpg') center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

.section { padding:40px 20px; text-align:center; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 8px rgba(0,0,0,0.1);
}

video {
  width:100%;
  margin-top:10px;
  border-radius:8px;
}

input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
}

.btn {
  background:#ff6600;
  color:white;
  padding:10px;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="conference.html">Conferences</a>
</nav>

<section class="hero">
<h1>International Conferences</h1>
<p>Connect • Learn • Grow</p>
</section>

<section class="section">
<h2>Available Conferences</h2>
<div class="grid" id="conferenceContainer"></div>
</section>

<section class="section">
<h2>Book Your Seat</h2>

<form id="bookingForm">
<input id="name" placeholder="Full Name" required>
<input id="email" placeholder="Email" required>

<select id="eventSelect"></select>

<select id="ticket">
<option value="Regular">Regular</option>
<option value="VIP">VIP</option>
<option value="VVIP">VVIP</option>
</select>

<button class="btn">Confirm Booking</button>
</form>

<p id="confirmation" style="color:green;"></p>
</section>

<!-- ✅ EMAILJS SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
/* ✅ INIT EMAILJS (YOUR REAL KEY) */
(function(){
  emailjs.init("Q14OcvMEllcm_ojdV");
})();

let eventsData = [];

/* LOAD EVENTS */
async function loadEvents(){
 try {
  const res = await fetch("/events");
  const events = await res.json();

  eventsData = events;

  let container = document.getElementById("conferenceContainer");
  let select = document.getElementById("eventSelect");

  container.innerHTML = "";
  select.innerHTML = "";

  events.forEach((e,i)=>{

    container.innerHTML += `
    <div class="card">
      <h3>${e.name}</h3>
      <p>${e.location} | ${e.date}</p>
      <p>${e.description}</p>

      ${e.video ? `
      <video controls>
        <source src="${e.video}" type="video/mp4">
      </video>
      ` : ""}
    </div>
    `;

    select.innerHTML += `<option value="${i}">${e.name}</option>`;
  });

 } catch(err){
  console.log("Error loading events", err);
 }
}

loadEvents();

/* 🔥 BOOKING WITH EMAIL */
document.getElementById("bookingForm").addEventListener("submit", function(e){
 e.preventDefault();

 const name = document.getElementById("name").value;
 const email = document.getElementById("email").value;
 const event = eventsData[document.getElementById("eventSelect").value];
 const ticket = document.getElementById("ticket").value;

 emailjs.send("service_u86yppn","template_dl2fdt8",{
  name: name,
  email: email,
  event: event.name,
  ticket: ticket
 })
 .then(function(response){
  document.getElementById("confirmation").innerText =
   "✅ Booking sent successfully!";
 })
 .catch(function(error){
  console.log("EmailJS ERROR:", error);
  alert("❌ Failed to send booking");
 });

 document.getElementById("bookingForm").reset();
});
</script>

</body>
</html>
