<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Conferences</title>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

nav {
  background:#0a1f44;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav-left {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo { height:40px; }

nav a {
  color:white;
  margin:0 10px;
  text-decoration:none;
}

.hero {
  height:50vh;
  background:#222;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

.section { padding:40px 20px; text-align:center; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:25px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
}

video { width:100%; border-radius:8px; }

.btn {
  background:#ff6600;
  color:white;
  padding:10px;
  border:none;
  cursor:pointer;
  border-radius:5px;
}
</style>
</head>

<body>

<nav>
<div class="nav-left">
  <img src="logo.png" class="logo">
</div>
<div>
<a href="index.html">Home</a>
<a href="conference.html">Conferences</a>
<a href="tourism.html">Tourism</a>
</div>
</nav>

<section class="hero">
<h1>Global Conferences</h1>
<p>Connecting Ideas, People & Opportunities</p>
</section>

<section class="section">
<h2>Conference Packages</h2>

<div class="grid">

<div class="card">
<h3>Investor–Producer Conference</h3>
<video controls>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>

<select id="ticket1">
<option value="1000">Regular - KES 1000</option>
<option value="2000">VIP - KES 2000</option>
</select>

<input id="email1" placeholder="Email">
<button class="btn" onclick="payNow(1)">Pay</button>
</div>

<div class="card">
<h3>Youth Leadership Conference</h3>
<video controls>
<source src="https://www.w3schools.com/html/movie.mp4">
</video>

<select id="ticket2">
<option value="1000">Regular</option>
<option value="2000">VIP</option>
</select>

<input id="email2" placeholder="Email">
<button class="btn" onclick="payNow(2)">Pay</button>
</div>

</div>
</section>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
function payNow(type){
let email = document.getElementById(type===1?"email1":"email2").value;
let amount = document.getElementById(type===1?"ticket1":"ticket2").value;

let handler = PaystackPop.setup({
key:"pk_test_f1a02bf2a0d437eeaff6995e005dd6dc74473780",
email:email,
amount:amount*100,
currency:"KES",
callback:function(){ alert("Payment successful"); }
});

handler.openIframe();
}
</script>

</body>
</html>
