<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Conferences</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
<a href="index.html">Home</a>
<a href="conference.html">Conferences</a>
<a href="tourism.html">Tourism</a>
</nav>

<section class="hero">
<h1>International Conferences</h1>
<p>Multi-country & professional conferences with advertising</p>
</section>

<section class="section" id="conferences">
<h2>Upcoming Conferences</h2>
<div class="grid" id="conferenceContainer">
<!-- Dynamically loaded conferences -->
</div>
</section>

<footer>
&copy; 2026 Global Conferences
</footer>

<script>
async function loadConferences(){
  const res = await fetch("http://localhost:5000/events");
  const events = await res.json();
  const container = document.getElementById("conferenceContainer");
  container.innerHTML = "";
  events.forEach(e=>{
    container.innerHTML += `
      <div class="card">
        <h3>${e.name}</h3>
        <p>${e.location} | ${e.date}</p>
        <div class="ad-box">${e.description || "Professional conference experience."}</div>
        ${e.video ? `<video controls src="videos/${e.video}"></video>` : ""}
      </div>
    `;
  });
}
loadConferences();
</script>

</body>
</html>
