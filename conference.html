<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Conferences</title>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

nav { background:#0a1f44; padding:15px; text-align:center; }
nav a { color:white; margin:0 15px; text-decoration:none; }

.hero {
  height:50vh;
  background:#222;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

.section { padding:40px 20px; text-align:center; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 8px rgba(0,0,0,0.1);
}

video {
  width:100%;
  margin-top:10px;
  border-radius:8px;
}

input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
}

.btn {
  background:#ff6600;
  color:white;
  padding:10px;
  border:none;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="conference.html">Conferences</a>
</nav>

<section class="hero">
<h1>International Conferences</h1>
</section>

<section class="section">
<h2>Available Conferences</h2>
<div class="grid" id="conferenceContainer"></div>
</section>

<section class="section">
<h2>Book Your Seat</h2>

<form id="bookingForm">
<input id="nameInput" placeholder="Full Name" required>
<input id="emailInput" placeholder="Email" required>

<select id="eventSelect"></select>

<select id="ticketSelect">
<option>Regular</option>
<option>VIP</option>
<option>VVIP</option>
</select>

<button class="btn">Book Now</button>
</form>

<p id="confirmation"></p>
</section>

<section class="section">
<h2>AI Assistant</h2>

<input id="aiInput" placeholder="Ask something...">
<button onclick="ask()">Ask AI</button>

<p id="aiOutput"></p>
</section>

<script>
const BASE_URL = "https://globia-production.up.railway.app";

let eventsData = [];

/* LOAD EVENTS */
async function loadEvents(){
  const res = await fetch(`${BASE_URL}/events`);
  const events = await res.json();

  eventsData = events;

  let container = document.getElementById("conferenceContainer");
  let select = document.getElementById("eventSelect");

  container.innerHTML = "";
  select.innerHTML = "";

  events.forEach((e,i)=>{

    container.innerHTML += `
      <div class="card">
        <h3>${e.name}</h3>
        <p>${e.location} | ${e.date}</p>
        <p>${e.description}</p>

        <video controls>
          <source src="${BASE_URL}${e.video}" type="video/mp4">
        </video>
      </div>
    `;

    select.innerHTML += `<option value="${i}">${e.name}</option>`;
  });
}

loadEvents();

/* BOOKING */
document.getElementById("bookingForm").addEventListener("submit", async (e)=>{
 e.preventDefault();

 const name = document.getElementById("nameInput").value;
 const email = document.getElementById("emailInput").value;
 const event = eventsData[document.getElementById("eventSelect").value];
 const ticket = document.getElementById("ticketSelect").value;

 await fetch(`${BASE_URL}/book`, {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({name,email,event:event.name,ticket})
 });

 document.getElementById("confirmation").innerText = "✅ Booking successful!";
 e.target.reset();
});

/* AI */
async function ask(){
 const input = document.getElementById("aiInput").value;

 const res = await fetch(`${BASE_URL}/ai`, {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({message:input})
 });

 const data = await res.json();
 document.getElementById("aiOutput").innerText = data.reply;
}
</script>

</body>
</html>
