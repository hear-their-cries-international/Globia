<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Conferences</title>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

nav { background:#0a1f44; padding:15px; text-align:center; }
nav a { color:white; margin:0 15px; text-decoration:none; }

.hero {
  height:50vh;
  background:#222;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

.section { padding:40px 20px; text-align:center; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 8px rgba(0,0,0,0.1);
}

video {
  width:100%;
  margin-top:10px;
  border-radius:8px;
}

.btn {
  background:#ff6600;
  color:white;
  padding:10px;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="conference.html">Conferences</a>
<a href="tourism.html">Tourism</a>
</nav>

<section class="hero">
<h1>International Conferences</h1>
</section>

<section class="section">
<h2>Available Conferences</h2>
<div class="grid" id="conferenceContainer"></div>
</section>

<section class="section">
<h2>Book & Pay</h2>

<input id="nameInput" placeholder="Full Name" required>
<input id="emailInput" placeholder="Email" required>

<select id="eventSelect"></select>

<select id="ticketSelect">
<option value="1000">Regular - KES 1000</option>
<option value="2000">VIP - KES 2000</option>
<option value="3000">VVIP - KES 3000</option>
</select>

<button class="btn" onclick="payNow()">Pay & Book</button>

<p id="confirmation"></p>
</section>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
const BASE_URL = "https://globia-production.up.railway.app";
let eventsData = [];

/* LOAD EVENTS */
async function loadEvents(){
  const res = await fetch(`${BASE_URL}/events`);
  const events = await res.json();

  eventsData = events;

  let container = document.getElementById("conferenceContainer");
  let select = document.getElementById("eventSelect");

  container.innerHTML = "";
  select.innerHTML = "";

  events.forEach((e,i)=>{
    container.innerHTML += `
      <div class="card">
        <h3>${e.name}</h3>
        <p>${e.location} | ${e.date}</p>
        <p>${e.description}</p>
        <video controls>
          <source src="${BASE_URL}${e.video}" type="video/mp4">
        </video>
      </div>
    `;

    select.innerHTML += `<option value="${i}">${e.name}</option>`;
  });
}

loadEvents();

/* PAYMENT */
function payNow(){
  const email = document.getElementById("emailInput").value;
  const amount = document.getElementById("ticketSelect").value;

  let handler = PaystackPop.setup({
    key: "YOUR_PUBLIC_KEY_HERE",
    email: email,
    amount: amount * 100,
    currency: "KES",
    callback: function(response){
      document.getElementById("confirmation").innerText = "✅ Payment successful!";
    }
  });

  handler.openIframe();
}
</script>

</body>
</html>
