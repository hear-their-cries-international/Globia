<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Conferences</title>
<style>
body { margin:0; font-family:Arial; background:#f4f4f4; color:#0a1f44; }
nav { background:#0a1f44; padding:15px; text-align:center; }
nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; }
.hero { height:50vh; background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
       url('images/conference1.jpg') center/cover no-repeat; display:flex; align-items:center; justify-content:center; color:white; }
.hero h1 { font-size:3em; }
.section { padding:50px 20px; text-align:center; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; }
.card { background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); text-align:left; }
.ad-box { background:#0a1f44; color:white; padding:15px; margin-top:10px; border-radius:8px; }
video { width:100%; border-radius:10px; margin-top:10px; }
footer { background:#0a1f44; color:white; text-align:center; padding:20px; }
</style>
</head>
<body>

<nav>
<a href="index.html">Home</a>
<a href="conference.html">Conferences</a>
<a href="tourism.html">Tourism</a>
</nav>

<section class="hero">
<h1>International Conferences</h1>
</section>

<section class="section" id="conferences">
<h2>Upcoming Conferences</h2>
<div class="grid" id="conferenceContainer"></div>
</section>

<footer>
&copy; 2026 Global Conferences
</footer>

<script>
async function loadConferences(){
  const res = await fetch("http://localhost:5000/events");
  const events = await res.json();
  const container = document.getElementById("conferenceContainer");
  container.innerHTML = "";
  events.forEach(e=>{
    container.innerHTML += `
      <div class="card">
        <h3>${e.name}</h3>
        <p>${e.location}</p>
        <p>${e.date}</p>
        <div class="ad-box">
          <p>${e.description || "Professional conference experience."}</p>
        </div>
        ${e.video ? `<video controls src="videos/${e.video}"></video>` : ""}
      </div>
    `;
  });
}
loadConferences();
</script>

</body>
</html>
