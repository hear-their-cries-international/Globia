<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="images/logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Globia Dating Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0b0f1a;color:white;}

nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px;background:#0a1f44;
}
.logo{height:45px;}

.hero{
  height:30vh;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url("images/dating.jpg") center/cover;
}

.card{
  width:320px;
  margin:auto;
  background:white;
  color:black;
  border-radius:20px;
  overflow:hidden;
}

.card img{width:100%;height:300px;object-fit:cover;}

.btn{padding:10px;border:none;border-radius:20px;cursor:pointer;margin:5px;}
.like{background:#ff2d55;color:white;}
.nope{background:#333;color:white;}
.vip{background:gold;color:black;}

.actions{display:flex;justify-content:center;margin-top:10px;}

.chatBox{
  max-width:400px;margin:auto;background:#111;padding:10px;border-radius:10px;
}
.msgs{height:200px;overflow:auto;background:black;padding:10px;}

input{width:100%;padding:10px;margin-top:5px;}
</style>

</head>

<body>

<nav>
  <img src="images/logo.png" class="logo">
  <div>
    <a href="#" style="color:white">Swipe</a>
    <a href="#" style="color:white">Matches</a>
    <a href="#" style="color:white">Chat</a>
  </div>
</nav>

<div class="hero">
  <h1>Globia Dating Pro 💘</h1>
</div>

<!-- PROFILE CARD -->
<div id="card"></div>

<div class="actions">
  <button class="btn nope" onclick="swipe('nope')">❌ Nope</button>
  <button class="btn like" onclick="swipe('like')">❤️ Like</button>
</div>

<!-- VIP -->
<div style="text-align:center;margin-top:20px;">
  <h3>VIP Unlock 💎</h3>
  <button class="btn vip" onclick="vip()">Upgrade</button>
</div>

<!-- CHAT (ONLY MATCHED USERS) -->
<div class="chatBox">
  <h3>Private Chat 💬</h3>
  <div class="msgs" id="msgs"></div>
  <input id="msg" placeholder="Send message">
  <button class="btn like" onclick="sendMsg()">Send</button>
</div>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  storageBucket: "globia-7038f.appspot.com",
  messagingSenderId: "323603007481",
  appId: "1:323603007481:web:ed058146cae31922dd9f28",
  databaseURL: "https://globia-7038f-default-rtdb.firebaseio.com/",
  measurementId: "G-Z4WRSESF54"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let me, users=[], index=0, currentTarget=null;

/* ================= AUTH ================= */
auth.onAuthStateChanged(user=>{
  if(!user) location.href="index.html";
  me=user;
  loadUsers();
});

/* ================= USERS ================= */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    users=[];
    snap.forEach(d=>{
      if(d.id!==me.uid){
        users.push({id:d.id,...d.data()});
      }
    });
    show();
  });
}

function show(){
  let u=users[index%users.length];
  currentTarget=u;

  document.getElementById("card").innerHTML=`
    <div class="card">
      <img src="${u.photo||'images/default.jpg'}">
      <div style="padding:10px">
        <h3>${u.name}, ${u.age}</h3>
        <p>${u.bio||''}</p>
      </div>
    </div>
  `;
}

/* ================= SWIPE ================= */
function swipe(type){
  if(!currentTarget) return;

  if(type==="like"){
    db.collection("swipes").add({
      from:me.uid,
      to:currentTarget.id,
      type:"like"
    });

    checkMatch(currentTarget.id);
  }

  index++;
  show();
}

/* ================= MATCH ================= */
function checkMatch(target){
  db.collection("swipes")
  .where("from","==",target)
  .where("to","==",me.uid)
  .where("type","==","like")
  .get().then(r=>{
    if(!r.empty){
      alert("🔥 MATCH!");
      createMatch(target);
    }
  });
}

function createMatch(target){
  db.collection("matches").add({
    users:[me.uid,target],
    time:Date.now()
  });
}

/* ================= PRIVATE CHAT ================= */
let chatRoom=null;

function openChat(matchId){
  chatRoom=matchId;
  db.collection("messages")
  .where("room","==",matchId)
  .onSnapshot(snap=>{
    let html="";
    snap.forEach(m=>{
      html+=`<p><b>${m.data().from}:</b> ${m.data().text}</p>`;
    });
    document.getElementById("msgs").innerHTML=html;
  });
}

function sendMsg(){
  if(!chatRoom) return alert("No match yet!");

  db.collection("messages").add({
    room:chatRoom,
    from:me.uid,
    text:document.getElementById("msg").value,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

/* ================= VIP ================= */
function vip(){
  alert("Connect Paystack here");
  db.collection("users").doc(me.uid).set({vip:true},{merge:true});
}

</script>

</body>
</html>
